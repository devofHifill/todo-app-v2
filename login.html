<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Todo App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Login</h1>

    <form>

        <input
            type="email"
            placeholder="Enter Email"
        >

        <br><br>

        <input
            type="password"
            placeholder="Enter Password"
        >

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

</div>

<script src="script.js"></script>

</body>
</html>
